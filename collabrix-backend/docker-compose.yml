version: "3.8"

services:
  neo4j:
    image: neo4j:5
    container_name: collabrix-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/collabrix123
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: .
    container_name: collabrix-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: collabrix123
      COLLABRIX_JWT_SECRET: CollabrixSecretKey2026ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnop
      COLLABRIX_CORS_ALLOWED_ORIGINS: "http://localhost:5500,http://localhost:3000,http://127.0.0.1:5500"
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
